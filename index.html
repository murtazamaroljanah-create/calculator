<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a4e 0%, #2d1b69 40%, #11998e 100%);
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  .calc {
    width: 340px;
    background: rgba(255,255,255,0.08);
    border-radius: 32px;
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    overflow: hidden;
  }

  /* Display */
  .display {
    padding: 28px 22px 18px;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    position: relative;
  }
  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }
  .hist-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
    font-family: inherit;
    transition: background 0.15s;
  }
  .hist-btn:hover { background: rgba(255,255,255,0.14); }
  .hist-btn:active { transform: scale(0.95); }
  .hist-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .hcount {
    background: rgba(139,92,246,0.7);
    color: #fff;
    border-radius: 10px;
    padding: 0 5px;
    font-size: 10px;
    display: none;
  }
  .expr-line {
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    text-align: right;
    min-height: 18px;
    font-family: 'SF Mono', 'Courier New', monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 4px;
  }
  .num-line {
    font-size: 50px;
    font-weight: 200;
    color: #ffffff;
    text-align: right;
    font-family: 'SF Mono', 'Courier New', monospace;
    line-height: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: font-size 0.1s;
  }
  .num-line.sm { font-size: 34px; }
  .active-op {
    font-size: 18px;
    color: rgba(167,139,250,0.7);
    position: absolute;
    bottom: 18px;
    left: 22px;
    opacity: 0;
    transition: opacity 0.2s;
    font-family: monospace;
  }
  .active-op.show { opacity: 1; }

  /* History panel */
  .hist-panel {
    display: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    max-height: 240px;
    overflow-y: auto;
  }
  .hist-panel.open { display: block; }
  .hist-panel::-webkit-scrollbar { width: 3px; }
  .hist-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  .hist-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px 6px;
  }
  .hist-title {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
  .hist-clear {
    font-size: 11px;
    color: rgba(255,100,100,0.75);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 2px 7px;
    border-radius: 6px;
  }
  .hist-clear:hover { background: rgba(255,80,80,0.12); }
  .hist-empty {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
  }
  .hist-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: background 0.1s;
  }
  .hist-item:last-child { border-bottom: none; }
  .hist-item:hover { background: rgba(255,255,255,0.06); }
  .hist-item:active { background: rgba(255,255,255,0.12); }
  .hist-expr { font-size: 11px; color: rgba(255,255,255,0.3); font-family: monospace; }
  .hist-result { font-size: 16px; font-weight: 300; color: rgba(255,255,255,0.85); font-family: monospace; }

  /* Keys */
  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: rgba(255,255,255,0.07);
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .k {
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    font-weight: 400;
    cursor: pointer;
    border: none;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.88);
    font-family: inherit;
    user-select: none;
    touch-action: manipulation;
    transition: background 0.1s, transform 0.08s;
  }
  .k:hover { background: rgba(255,255,255,0.1); }
  .k:active { background: rgba(255,255,255,0.18); transform: scale(0.92); }
  .k.fn { color: rgba(255,255,255,0.55); font-size: 14px; font-weight: 500; }
  .k.op { color: #a78bfa; font-size: 21px; }
  .k.eq {
    background: rgba(139,92,246,0.45);
    color: #fff;
    font-size: 24px;
    border: 1px solid rgba(139,92,246,0.5);
  }
  .k.eq:hover { background: rgba(139,92,246,0.6); }
  .k.eq:active { background: rgba(139,92,246,0.75); transform: scale(0.92); }

  /* Bottom */
  .bottom {
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 12px 16px 16px;
  }
  .clear-all {
    width: 100%;
    padding: 13px;
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.22);
    border-radius: 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,130,130,0.9);
    font-family: inherit;
    letter-spacing: 0.03em;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .clear-all:hover { background: rgba(255,80,80,0.17); }
  .clear-all:active { transform: scale(0.98); }
  .clear-all svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<div class="calc">
  <div class="display">
    <div class="top-row">
      <span class="label">Calculator</span>
      <button class="hist-btn" id="histBtn">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
        <span class="hcount" id="hcount"></span>
      </button>
    </div>
    <div class="expr-line" id="expr"></div>
    <div class="num-line" id="result">0</div>
    <div class="active-op" id="activeOp"></div>
  </div>

  <div class="hist-panel" id="histPanel">
    <div class="hist-header">
      <span class="hist-title">Last 10 calculations</span>
      <button class="hist-clear" id="histClear">Clear</button>
    </div>
    <div id="histList"><div class="hist-empty">No calculations yet</div></div>
  </div>

  <div class="keys" id="keys">
    <button class="k fn" data-v="AC">AC</button>
    <button class="k fn" data-v="+/-">±</button>
    <button class="k fn" data-v="%">%</button>
    <button class="k op" data-v="÷">÷</button>

    <button class="k" data-v="7">7</button>
    <button class="k" data-v="8">8</button>
    <button class="k" data-v="9">9</button>
    <button class="k op" data-v="×">×</button>

    <button class="k" data-v="4">4</button>
    <button class="k" data-v="5">5</button>
    <button class="k" data-v="6">6</button>
    <button class="k op" data-v="−">−</button>

    <button class="k" data-v="1">1</button>
    <button class="k" data-v="2">2</button>
    <button class="k" data-v="3">3</button>
    <button class="k op" data-v="+">+</button>

    <button class="k" data-v="0">0</button>
    <button class="k" data-v=".">.</button>
    <button class="k fn" data-v="⌫">⌫</button>
    <button class="k eq" data-v="=">=</button>
  </div>

  <div class="bottom">
    <button class="clear-all" id="clearAll">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      Clear all
    </button>
  </div>
</div>

<script>
  const res = document.getElementById('result');
  const exEl = document.getElementById('expr');
  const aopEl = document.getElementById('activeOp');
  const histPanel = document.getElementById('histPanel');
  const histList = document.getElementById('histList');
  const hcount = document.getElementById('hcount');
  const histBtn = document.getElementById('histBtn');

  let cur = '0', expr = '', op = null, operand = null, ev = false, wait = false, log = [];

  function fmt(n) {
    const s = parseFloat(n.toPrecision(12)).toString();
    return s.length > 12 ? parseFloat(n.toPrecision(9)).toString() : s;
  }

  function upd() {
    const v = cur.length > 12 ? parseFloat(cur).toPrecision(8) : cur;
    res.textContent = v;
    res.className = 'num-line' + (v.length > 10 ? ' sm' : '');
    exEl.textContent = expr;
    aopEl.textContent = op || '';
    aopEl.className = 'active-op' + (op && wait ? ' show' : '');
  }

  function addLog(e, r) {
    log.unshift({ e, r });
    if (log.length > 10) log.pop();
    renderLog();
  }

  function renderLog() {
    if (!log.length) {
      histList.innerHTML = '<div class="hist-empty">No calculations yet</div>';
      hcount.style.display = 'none';
      return;
    }
    hcount.textContent = log.length;
    hcount.style.display = 'inline';
    histList.innerHTML = log.map((h, i) =>
      `<div class="hist-item" data-i="${i}">
        <span class="hist-expr">${h.e}</span>
        <span class="hist-result">${h.r}</span>
      </div>`
    ).join('');
    histList.querySelectorAll('.hist-item').forEach(el => {
      el.addEventListener('click', () => {
        cur = log[+el.dataset.i].r;
        ev = true; wait = false; op = null; operand = null; expr = '';
        upd();
        histPanel.classList.remove('open');
      });
    });
  }

  histBtn.addEventListener('click', () => histPanel.classList.toggle('open'));
  document.getElementById('histClear').addEventListener('click', () => { log = []; renderLog(); });
  document.getElementById('clearAll').addEventListener('click', () => {
    cur = '0'; expr = ''; op = null; operand = null; ev = wait = false; upd();
  });

  function calc(o, a, b) {
    if (o === '+') return a + b;
    if (o === '−') return a - b;
    if (o === '×') return a * b;
    if (o === '÷') return b === 0 ? NaN : a / b;
  }

  document.getElementById('keys').addEventListener('click', e => {
    const btn = e.target.closest('.k'); if (!btn) return;
    const v = btn.dataset.v;
    if (v === 'AC') { cur = '0'; expr = ''; op = null; operand = null; ev = wait = false; }
    else if (v === '+/-') { if (cur !== '0') cur = cur.startsWith('-') ? cur.slice(1) : '-' + cur; }
    else if (v === '%') { cur = fmt(parseFloat(cur) / 100); }
    else if (v === '⌫') { if (ev) { cur = '0'; ev = false; } else cur = cur.length > 1 ? cur.slice(0, -1) : '0'; }
    else if (['+', '−', '×', '÷'].includes(v)) {
      if (op && !wait) {
        const r = calc(op, operand, parseFloat(cur));
        if (isNaN(r) || !isFinite(r)) { cur = 'Error'; op = null; operand = null; expr = ''; upd(); return; }
        cur = fmt(r); operand = r;
      } else { operand = parseFloat(cur); }
      op = v; expr = cur + ' ' + v; wait = true; ev = false;
    }
    else if (v === '=') {
      if (op && operand !== null) {
        const b = parseFloat(cur), r = calc(op, operand, b);
        const fe = fmt(operand) + ' ' + op + ' ' + fmt(b);
        expr = fe + ' =';
        if (isNaN(r) || !isFinite(r)) { cur = 'Error'; }
        else { cur = fmt(r); addLog(fe, cur); }
        op = null; operand = null; wait = false; ev = true;
      }
    }
    else if (v === '.') {
      if (ev || wait) { cur = '0'; ev = wait = false; }
      if (!cur.includes('.')) cur += '.';
    }
    else {
      if (ev) { cur = v; ev = false; }
      else if (wait) { cur = v; wait = false; }
      else cur = cur === '0' ? v : cur + v;
    }
    upd();
  });
</script>
</body>
</html>
